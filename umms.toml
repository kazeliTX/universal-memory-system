# UMMS Configuration
# All values shown are defaults. Uncomment and modify to override.

[cache.l0]
max_capacity = 50
eviction = "fifo"
session_aware = true

[cache.l1]
max_capacity = 200
eviction = "lru"
session_aware = true

# [promotion]
# min_importance = 0.7
# min_access_count = 3
# min_age_hours = 24

# [decay]
# enabled = false
# rate = 0.05
# floor = 0.01
# archive_threshold = 0.05
# archive_after_days = 90
# delete_originals = false

# [graph_evolution]
# min_similarity = 0.8
# max_merge_per_run = 10
# edge_boost_factor = 1.1

[encoder]
provider = "gemini"
model = "gemini-embedding-001"
dimension = 3072
timeout_ms = 5000
max_retries = 2
api_key_env = "GEMINI_API_KEY"

[retriever]
bm25_weight = 0.3
top_k_recall = 200
top_k_rerank = 20
top_k_final = 10
lif_hops = 2
lif_max_nodes = 100
min_score = 0.55
auto_escalate = true
escalation_threshold = 3

[tag]
enabled = true
auto_extract = true
# Tokenizer: "jieba" (Chinese+English), "llm" (LLM key term extraction), "whitespace" (English only)
tokenizer = "jieba"

[[model_pool.models]]
id = "gemini-embed"
provider = "gemini"
# Use "gemini-embedding-002" for multimodal embedding (images + text).
# "gemini-embedding-001" supports text only.
model_name = "gemini-embedding-001"
api_key_env = "GEMINI_API_KEY"
tasks = ["embedding"]
dimension = 3072
timeout_ms = 10000
max_retries = 2

[[model_pool.models]]
id = "gemini-flash"
provider = "gemini"
model_name = "gemini-2.5-flash"
api_key_env = "GEMINI_API_KEY"
tasks = ["generation", "entity_extraction", "chat"]
max_tokens = 8192
timeout_ms = 30000
max_retries = 2

[model_pool.routing]
embedding = "gemini-embed"
generation = "gemini-flash"
reranking = "gemini-embed"
entity_extraction = "gemini-flash"
chat = "gemini-flash"


[http]
host = "127.0.0.1"
port = 8720


[importance]
recency_half_life_days = 7.0
frequency_log_base = 10.0
frequency_weight = 0.15
centrality_weight = 0.10
cross_agent_bonus = 0.05
cross_agent_max = 0.15
feedback_weight = 0.10

[storage]
graph_backend = "cozo"