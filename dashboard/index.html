<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMMS Dev Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
  }
  #uptime {
    font-size: 14px;
    color: var(--text-dim);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .panel h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.ok { background: var(--green); }
  .dot.err { background: var(--red); }
  .stat-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .stat-row .label { color: var(--text-dim); }
  .stat-row .value { color: var(--text); font-weight: 600; }
  .agent-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .agent-tag {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 12px;
    color: var(--accent);
  }
  .actions {
    margin-bottom: 16px;
  }
  button {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--surface);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  button:hover {
    border-color: var(--accent);
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #seed-status {
    display: inline-block;
    margin-left: 12px;
    font-size: 13px;
    color: var(--green);
  }
  .collapsible {
    margin-top: 8px;
  }
  .collapsible summary {
    cursor: pointer;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
    user-select: none;
  }
  .collapsible summary:hover {
    color: var(--accent);
  }
  #metrics-text {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre;
    max-height: 400px;
    overflow-y: auto;
    color: var(--text-dim);
  }
  .error-banner {
    background: #1a0000;
    border: 1px solid var(--red);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>UMMS Dev Dashboard</h1>
  <span id="uptime">--</span>
</header>

<div id="error-banner" class="error-banner"></div>

<div class="grid">
  <!-- Health panel -->
  <div class="panel">
    <h2>Health</h2>
    <div id="health-indicators">
      <div class="indicator"><span class="dot" id="dot-cache"></span> Cache</div>
      <div class="indicator"><span class="dot" id="dot-vector"></span> Vector Store</div>
      <div class="indicator"><span class="dot" id="dot-graph"></span> Graph Store</div>
      <div class="indicator"><span class="dot" id="dot-files"></span> File Store</div>
    </div>
  </div>

  <!-- Cache stats -->
  <div class="panel">
    <h2>Cache (L0 / L1)</h2>
    <div class="stat-row">
      <span class="label">L0 (Sensory Buffer)</span>
      <span class="value" id="stat-l0">--</span>
    </div>
    <div class="stat-row">
      <span class="label">L1 (Working Memory)</span>
      <span class="value" id="stat-l1">--</span>
    </div>
  </div>

  <!-- Vector stats -->
  <div class="panel">
    <h2>Vector Store (L2)</h2>
    <div class="stat-row">
      <span class="label">Total Entries</span>
      <span class="value" id="stat-vec-total">--</span>
    </div>
  </div>

  <!-- Graph stats -->
  <div class="panel">
    <h2>Knowledge Graph (L3)</h2>
    <div class="stat-row">
      <span class="label">Total Nodes</span>
      <span class="value" id="stat-nodes">--</span>
    </div>
    <div class="stat-row">
      <span class="label">Total Edges</span>
      <span class="value" id="stat-edges">--</span>
    </div>
    <div class="stat-row">
      <span class="label">Shared Nodes</span>
      <span class="value" id="stat-shared">--</span>
    </div>
  </div>

  <!-- Agents -->
  <div class="panel">
    <h2>Agents</h2>
    <div id="agent-list" class="agent-list">--</div>
  </div>
</div>

<div class="actions">
  <button id="seed-btn" onclick="doSeed()">Seed Demo Data</button>
  <span id="seed-status"></span>
</div>

<details class="collapsible">
  <summary>Prometheus Metrics</summary>
  <pre id="metrics-text">Loading...</pre>
</details>

<script>
const API = '';

function formatUptime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  const parts = [];
  if (h > 0) parts.push(h + 'h');
  if (m > 0) parts.push(m + 'm');
  parts.push(s + 's');
  return 'uptime: ' + parts.join(' ');
}

function setDot(id, status) {
  const el = document.getElementById(id);
  el.className = 'dot ' + (status === 'ok' ? 'ok' : 'err');
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

async function fetchHealth() {
  try {
    const r = await fetch(API + '/api/health');
    const d = await r.json();
    document.getElementById('uptime').textContent = formatUptime(d.uptime_secs);
    setDot('dot-cache', d.storage.cache);
    setDot('dot-vector', d.storage.vector);
    setDot('dot-graph', d.storage.graph);
    setDot('dot-files', d.storage.files);
    hideError();
  } catch (e) {
    showError('Cannot reach server: ' + e.message);
  }
}

async function fetchStats() {
  try {
    const r = await fetch(API + '/api/stats');
    const d = await r.json();
    document.getElementById('stat-l0').textContent = d.cache.l0_entries;
    document.getElementById('stat-l1').textContent = d.cache.l1_entries;
    document.getElementById('stat-vec-total').textContent = d.vector.total_entries;
    document.getElementById('stat-nodes').textContent = d.graph.total_nodes;
    document.getElementById('stat-edges').textContent = d.graph.total_edges;
    document.getElementById('stat-shared').textContent = d.graph.shared_nodes;

    const agentEl = document.getElementById('agent-list');
    agentEl.innerHTML = '';
    d.agents.forEach(function(a) {
      const tag = document.createElement('span');
      tag.className = 'agent-tag';
      tag.textContent = a;
      agentEl.appendChild(tag);
    });
  } catch (_) {}
}

async function fetchMetrics() {
  try {
    const r = await fetch(API + '/api/metrics');
    const text = await r.text();
    document.getElementById('metrics-text').textContent = text || '(no metrics yet)';
  } catch (_) {}
}

async function doSeed() {
  const btn = document.getElementById('seed-btn');
  const status = document.getElementById('seed-status');
  btn.disabled = true;
  status.textContent = 'seeding...';
  try {
    const r = await fetch(API + '/api/demo/seed');
    const d = await r.json();
    status.textContent = 'Seeded ' + d.memories + ' memories, '
      + d.nodes + ' nodes, ' + d.edges + ' edges';
    await refresh();
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    status.style.color = '#f85149';
  } finally {
    btn.disabled = false;
  }
}

async function refresh() {
  await Promise.all([fetchHealth(), fetchStats(), fetchMetrics()]);
}

// Initial load
refresh();

// Auto-refresh every 5 seconds
setInterval(refresh, 5000);
</script>

</body>
</html>
